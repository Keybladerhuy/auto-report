<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Excel to Google Sheets animation</title>
  <desc>Animated sequence: an Excel file gains new rows, then uploads to Google Sheets</desc>
  <defs>
    <style>
      .t { font-family: Arial, sans-serif; font-size: 14px; fill: #1a1a1a; }
      .ts { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
      .th { font-family: Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }

      .row-new { opacity: 0; }
      .row1 { animation: rowAppear 8s ease infinite; animation-delay: 0.5s; }
      .row2 { animation: rowAppear 8s ease infinite; animation-delay: 1.1s; }
      .row3 { animation: rowAppear 8s ease infinite; animation-delay: 1.7s; }
      .row4 { animation: rowAppear 8s ease infinite; animation-delay: 2.3s; }

      @keyframes rowAppear {
        0%   { opacity: 0; transform: translateY(6px); }
        5%   { opacity: 1; transform: translateY(0); }
        45%  { opacity: 1; }
        55%  { opacity: 0; }
        100% { opacity: 0; }
      }

      #fileGroup {
        animation: fileFloat 8s ease-in-out infinite;
        transform-origin: 340px 230px;
      }
      @keyframes fileFloat {
        0%   { transform: translate(0, 0) scale(1); opacity: 1; }
        40%  { transform: translate(0, 0) scale(1); opacity: 1; }
        55%  { transform: translate(0, -60px) scale(0.85); opacity: 1; }
        70%  { transform: translate(0, -120px) scale(0.5); opacity: 0.6; }
        80%  { transform: translate(0, -150px) scale(0.1); opacity: 0; }
        90%  { transform: translate(0, 0) scale(1); opacity: 0; }
        95%  { transform: translate(0, 0) scale(1); opacity: 1; }
        100% { transform: translate(0, 0) scale(1); opacity: 1; }
      }

      #sheetsGroup {
        animation: sheetsPulse 8s ease infinite;
        transform-origin: 340px 80px;
      }
      @keyframes sheetsPulse {
        0%   { transform: scale(1); }
        65%  { transform: scale(1); }
        72%  { transform: scale(1.15); }
        80%  { transform: scale(1); }
        100% { transform: scale(1); }
      }

      #arrowGroup {
        opacity: 0;
        animation: arrowShow 8s ease infinite;
      }
      @keyframes arrowShow {
        0%   { opacity: 0; }
        42%  { opacity: 0; }
        48%  { opacity: 1; }
        72%  { opacity: 0; }
        100% { opacity: 0; }
      }

      #statusLabel { animation: statusCycle 8s ease infinite; }
      @keyframes statusCycle {
        0%   { opacity: 1; }
        5%   { opacity: 0; }
        100% { opacity: 0; }
      }

      #updatingLabel { opacity: 0; animation: updatingCycle 8s ease infinite; }
      @keyframes updatingCycle {
        0%   { opacity: 0; }
        4%   { opacity: 1; }
        40%  { opacity: 1; }
        45%  { opacity: 0; }
        100% { opacity: 0; }
      }

      #uploadingLabel { opacity: 0; animation: uploadingCycle 8s ease infinite; }
      @keyframes uploadingCycle {
        0%   { opacity: 0; }
        43%  { opacity: 0; }
        48%  { opacity: 1; }
        75%  { opacity: 1; }
        80%  { opacity: 0; }
        100% { opacity: 0; }
      }

      #doneLabel { opacity: 0; animation: doneCycle 8s ease infinite; }
      @keyframes doneCycle {
        0%   { opacity: 0; }
        78%  { opacity: 0; }
        83%  { opacity: 1; }
        93%  { opacity: 1; }
        98%  { opacity: 0; }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="380" fill="#ffffff"/>

  <!-- Google Sheets Icon -->
  <g id="sheetsGroup">
    <rect x="302" y="28" width="76" height="96" rx="6" fill="#fff" stroke="#dadce0" stroke-width="1"/>
    <polygon points="354,28 378,52 354,52" fill="#e0e0e0"/>
    <line x1="354" y1="28" x2="354" y2="52" stroke="#dadce0" stroke-width="0.5"/>
    <line x1="354" y1="52" x2="378" y2="52" stroke="#dadce0" stroke-width="0.5"/>
    <rect x="302" y="28" width="76" height="20" rx="6" fill="#0F9D58"/>
    <rect x="302" y="38" width="76" height="10" fill="#0F9D58"/>
    <line x1="316" y1="58" x2="364" y2="58" stroke="#e8f5e9" stroke-width="0.8"/>
    <line x1="316" y1="67" x2="364" y2="67" stroke="#e8f5e9" stroke-width="0.8"/>
    <line x1="316" y1="76" x2="364" y2="76" stroke="#e8f5e9" stroke-width="0.8"/>
    <line x1="316" y1="85" x2="364" y2="85" stroke="#e8f5e9" stroke-width="0.8"/>
    <line x1="338" y1="58" x2="338" y2="112" stroke="#e8f5e9" stroke-width="0.8"/>
    <text x="340" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F9D58" font-weight="500">Google Sheets</text>
  </g>

  <!-- Upload Arrow -->
  <g id="arrowGroup">
    <line x1="340" y1="200" x2="340" y2="148" stroke="#0F9D58" stroke-width="2" stroke-dasharray="5 3"/>
    <polygon points="340,140 333,155 347,155" fill="#0F9D58"/>
  </g>

  <!-- Excel File -->
  <g id="fileGroup">
    <rect x="230" y="155" width="220" height="175" rx="8" fill="#f4f4f4" stroke="#e0e0e0" stroke-width="0.5"/>
    <rect x="230" y="155" width="220" height="32" rx="8" fill="#1D6F42"/>
    <rect x="230" y="171" width="220" height="16" fill="#1D6F42"/>
    <text x="248" y="176" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="white">&#10005;</text>
    <text x="263" y="176" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="white">data.xlsx</text>

    <!-- Column headers -->
    <rect x="230" y="187" width="220" height="20" fill="#e8f0e9"/>
    <line x1="300" y1="187" x2="300" y2="330" stroke="#c8d8c9" stroke-width="0.5"/>
    <line x1="370" y1="187" x2="370" y2="330" stroke="#c8d8c9" stroke-width="0.5"/>
    <text x="262" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1D6F42" font-weight="500">ID</text>
    <text x="333" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1D6F42" font-weight="500">Name</text>
    <text x="406" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1D6F42" font-weight="500">Value</text>

    <!-- Existing rows -->
    <rect x="230" y="207" width="220" height="20" fill="#fff"/>
    <text x="262" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">001</text>
    <text x="333" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Alpha</text>
    <text x="406" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1,240</text>

    <rect x="230" y="227" width="220" height="20" fill="#f9fafb"/>
    <text x="262" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">002</text>
    <text x="333" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Beta</text>
    <text x="406" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">875</text>

    <rect x="230" y="247" width="220" height="20" fill="#fff"/>
    <text x="262" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">003</text>
    <text x="333" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Gamma</text>
    <text x="406" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">3,102</text>

    <line x1="230" y1="207" x2="450" y2="207" stroke="#e4ece5" stroke-width="0.5"/>
    <line x1="230" y1="227" x2="450" y2="227" stroke="#e4ece5" stroke-width="0.5"/>
    <line x1="230" y1="247" x2="450" y2="247" stroke="#e4ece5" stroke-width="0.5"/>

    <!-- New rows (animated) -->
    <g class="row-new row1">
      <rect x="230" y="267" width="220" height="20" fill="#f0fdf4"/>
      <line x1="230" y1="267" x2="450" y2="267" stroke="#e4ece5" stroke-width="0.5"/>
      <text x="262" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">004</text>
      <text x="333" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Delta</text>
      <text x="406" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">510</text>
    </g>
    <g class="row-new row2">
      <rect x="230" y="287" width="220" height="20" fill="#f0fdf4"/>
      <line x1="230" y1="287" x2="450" y2="287" stroke="#e4ece5" stroke-width="0.5"/>
      <text x="262" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">005</text>
      <text x="333" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Epsilon</text>
      <text x="406" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">2,780</text>
    </g>
    <g class="row-new row3">
      <rect x="230" y="307" width="220" height="20" fill="#f0fdf4"/>
      <line x1="230" y1="307" x2="450" y2="307" stroke="#e4ece5" stroke-width="0.5"/>
      <text x="262" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">006</text>
      <text x="333" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Zeta</text>
      <text x="406" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">960</text>
    </g>
    <g class="row-new row4">
      <rect x="230" y="327" width="220" height="20" fill="#f0fdf4"/>
      <line x1="230" y1="327" x2="450" y2="327" stroke="#e4ece5" stroke-width="0.5"/>
      <text x="262" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">007</text>
      <text x="333" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Eta</text>
      <text x="406" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">4,450</text>
    </g>
  </g>

  <!-- Status labels -->
  <text id="statusLabel" x="340" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Idle...</text>
  <text id="updatingLabel" x="340" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1D6F42">Updating rows...</text>
  <text id="uploadingLabel" x="340" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8">Uploading to Google Sheets...</text>
  <text id="doneLabel" x="340" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F9D58">&#10003; Synced!</text>
</svg>

<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Custom Report Delivery</title>
  <desc>A personalized PDF report gets stamped with the user's name, then sent simultaneously to email and Teams/Slack chat.</desc>

  <defs>
    <style>
      /* ── LOOP: 10s total ──
         Phase 1 (0–2s):   PDF + cover content appears
         Phase 2 (2–4.5s): Stamp drops, imprints, lifts
         Phase 3 (4.5–7s): Arrows shoot out, icons appear
         Phase 4 (7–9s):   Delivered badges pulse
         Reset  (9–10s):   Everything fades, loops
      */

      /* ── PDF DOCUMENT ── */
      #pdf-group {
        animation: pdfAppear 10s ease infinite;
      }
      @keyframes pdfAppear {
        0%       { opacity: 0; transform: translateY(12px); }
        8%       { opacity: 1; transform: translateY(0); }
        88%      { opacity: 1; transform: translateY(0); }
        96%,100% { opacity: 0; transform: translateY(0); }
      }

      /* Cover content lines stagger in */
      #cover-line1 { opacity: 0; animation: coverFade 10s ease infinite; animation-delay: 0.4s; }
      #cover-line2 { opacity: 0; animation: coverFade 10s ease infinite; animation-delay: 0.7s; }
      #cover-line3 { opacity: 0; animation: coverFade 10s ease infinite; animation-delay: 1.0s; }
      #cover-chart { opacity: 0; animation: coverFade 10s ease infinite; animation-delay: 1.3s; }

      @keyframes coverFade {
        0%,5%    { opacity: 0; }
        18%,88%  { opacity: 1; }
        96%,100% { opacity: 0; }
      }

      /* ── STAMP ── */
      #stamp-group {
        animation: stampDrop 10s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
        transform-origin: 340px 60px;
      }
      @keyframes stampDrop {
        0%,18%   { transform: translateY(0px);   opacity: 0; }
        20%      { transform: translateY(0px);   opacity: 1; }
        28%      { transform: translateY(138px); opacity: 1; } /* slam down */
        30%      { transform: translateY(130px); opacity: 1; } /* small bounce */
        34%      { transform: translateY(138px); opacity: 1; }
        44%      { transform: translateY(138px); opacity: 1; } /* hold */
        50%      { transform: translateY(0px);   opacity: 1; } /* lift */
        54%,100% { transform: translateY(0px);   opacity: 0; }
      }

      /* Ink imprint appears on impact, stays */
      #stamp-imprint {
        opacity: 0;
        animation: imprintAppear 10s ease infinite;
      }
      @keyframes imprintAppear {
        0%,31%   { opacity: 0; }
        34%,88%  { opacity: 1; }
        96%,100% { opacity: 0; }
      }

      /* ── ARROWS shoot out left and right ── */
      #arrow-left {
        opacity: 0;
        animation: arrowLeft 10s ease infinite;
      }
      @keyframes arrowLeft {
        0%,52%   { opacity: 0; transform: translateX(0px); }
        54%      { opacity: 1; transform: translateX(0px); }
        64%,88%  { opacity: 1; transform: translateX(-118px); }
        96%,100% { opacity: 0; transform: translateX(-118px); }
      }

      #arrow-right {
        opacity: 0;
        animation: arrowRight 10s ease infinite;
      }
      @keyframes arrowRight {
        0%,52%   { opacity: 0; transform: translateX(0px); }
        54%      { opacity: 1; transform: translateX(0px); }
        64%,88%  { opacity: 1; transform: translateX(118px); }
        96%,100% { opacity: 0; transform: translateX(118px); }
      }

      /* ── EMAIL ICON ── */
      #email-group {
        opacity: 0;
        animation: iconAppear 10s ease infinite;
      }
      @keyframes iconAppear {
        0%,60%   { opacity: 0; transform: scale(0.6); }
        66%,88%  { opacity: 1; transform: scale(1); }
        96%,100% { opacity: 0; transform: scale(1); }
      }

      /* ── TEAMS/SLACK ICON ── */
      #chat-group {
        opacity: 0;
        animation: iconAppear 10s ease infinite;
        animation-delay: 0.1s;
      }

      /* Notification badge pulse */
      #email-badge {
        opacity: 0;
        animation: badgePop 10s ease infinite;
      }
      #chat-badge {
        opacity: 0;
        animation: badgePop 10s ease infinite;
        animation-delay: 0.2s;
      }
      @keyframes badgePop {
        0%,67%   { opacity: 0; transform: scale(0); }
        72%      { opacity: 1; transform: scale(1.3); }
        76%,88%  { opacity: 1; transform: scale(1); }
        96%,100% { opacity: 0; transform: scale(1); }
      }

      /* Delivered checkmarks */
      #email-check {
        opacity: 0;
        animation: checkAppear 10s ease infinite;
      }
      #chat-check {
        opacity: 0;
        animation: checkAppear 10s ease infinite;
        animation-delay: 0.3s;
      }
      @keyframes checkAppear {
        0%,74%   { opacity: 0; }
        80%,88%  { opacity: 1; }
        96%,100% { opacity: 0; }
      }

      /* ── STATUS LABELS ── */
      #lbl-idle     { animation: lblIdle 10s ease infinite; }
      #lbl-building { opacity: 0; animation: lblBuilding 10s ease infinite; }
      #lbl-stamping { opacity: 0; animation: lblStamping 10s ease infinite; }
      #lbl-sending  { opacity: 0; animation: lblSending 10s ease infinite; }
      #lbl-done     { opacity: 0; animation: lblDone 10s ease infinite; }

      @keyframes lblIdle {
        0%,5%    { opacity: 1; }
        8%,100%  { opacity: 0; }
      }
      @keyframes lblBuilding {
        0%,7%    { opacity: 0; }
        10%,19%  { opacity: 1; }
        22%,100% { opacity: 0; }
      }
      @keyframes lblStamping {
        0%,20%   { opacity: 0; }
        22%,50%  { opacity: 1; }
        54%,100% { opacity: 0; }
      }
      @keyframes lblSending {
        0%,53%   { opacity: 0; }
        56%,70%  { opacity: 1; }
        74%,100% { opacity: 0; }
      }
      @keyframes lblDone {
        0%,73%   { opacity: 0; }
        78%,90%  { opacity: 1; }
        96%,100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- White background -->
  <rect width="680" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1a1a1a">Custom Report Delivery</text>

  <!-- ══════════════ STAMP (above PDF, drops down) ══════════════ -->
  <g id="stamp-group">
    <!-- Handle -->
    <rect x="316" y="52" width="48" height="18" rx="4" fill="#555555"/>
    <rect x="322" y="65" width="36" height="6" fill="#444444"/>
    <!-- Stamp base -->
    <rect x="308" y="71" width="64" height="28" rx="3" fill="#dc2626"/>
    <!-- Stamp text -->
    <text x="340" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#ffffff">PERSONALIZED</text>
    <text x="340" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffcccc">FOR: ANDY K.</text>
  </g>

  <!-- ══════════════ PDF DOCUMENT (center) ══════════════ -->
  <g id="pdf-group">
    <!-- Drop shadow suggestion -->
    <rect x="228" y="102" width="224" height="216" rx="8" fill="#e8e8e8"/>
    <!-- Main page -->
    <rect x="224" y="98" width="224" height="216" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1.5"/>
    <!-- Folded corner -->
    <polygon points="416,98 448,130 416,130" fill="#e8e8e8"/>
    <line x1="416" y1="98" x2="416" y2="130" stroke="#d0d0d0" stroke-width="1"/>
    <line x1="416" y1="130" x2="448" y2="130" stroke="#d0d0d0" stroke-width="1"/>
    <!-- Red header bar -->
    <rect x="224" y="98" width="224" height="36" rx="8" fill="#dc2626"/>
    <rect x="224" y="118" width="224" height="16" fill="#dc2626"/>
    <!-- PDF label -->
    <rect x="234" y="104" width="26" height="16" rx="2" fill="#ffffff"/>
    <text x="247" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#dc2626">PDF</text>

    <!-- Cover title -->
    <g id="cover-line1">
      <text x="340" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a1a1a">Monthly Report</text>
    </g>
    <g id="cover-line2">
      <text x="340" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555555">Japan Region · Revenue</text>
    </g>
    <g id="cover-line3">
      <text x="340" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaaaaa">Generated for: Andy K.</text>
    </g>

    <!-- Mini chart inside PDF -->
    <g id="cover-chart">
      <!-- Chart area -->
      <line x1="254" y1="278" x2="420" y2="278" stroke="#e0e0e0" stroke-width="0.8"/>
      <!-- Bars -->
      <rect x="268" y="248" width="22" height="30" rx="2" fill="#1a73e8" opacity="0.6"/>
      <rect x="298" y="234" width="22" height="44" rx="2" fill="#1a73e8" opacity="0.7"/>
      <rect x="328" y="242" width="22" height="36" rx="2" fill="#1a73e8" opacity="0.8"/>
      <rect x="358" y="220" width="22" height="58" rx="2" fill="#1a73e8"/>
      <rect x="388" y="228" width="22" height="50" rx="2" fill="#0F9D58"/>
      <!-- Trend line -->
      <polyline points="279,250 309,236 339,244 369,222 399,230"
                fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
      <!-- X labels -->
      <text x="279" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#aaa">Aug</text>
      <text x="309" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#aaa">Sep</text>
      <text x="339" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#aaa">Oct</text>
      <text x="369" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#aaa">Nov</text>
      <text x="399" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#0F9D58">Dec</text>
    </g>
  </g>

  <!-- ══════════════ STAMP IMPRINT (on PDF cover) ══════════════ -->
  <g id="stamp-imprint">
    <!-- Red ink border ring -->
    <rect x="296" y="195" width="88" height="40" rx="5" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="3 2" opacity="0.7"/>
    <!-- Ink fill -->
    <rect x="299" y="198" width="82" height="34" rx="3" fill="#fef2f2" opacity="0.85"/>
    <text x="340" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#dc2626">PERSONALIZED</text>
    <text x="340" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#dc2626">FOR: ANDY K.</text>
  </g>

  <!-- ══════════════ ARROWS shooting out ══════════════ -->
  <!-- Left arrow (toward email) -->
  <g id="arrow-left" style="transform-origin: 224px 205px;">
    <line x1="170" y1="205" x2="222" y2="205" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="162,205 174,199 174,211" fill="#1a73e8"/>
  </g>
  <!-- Right arrow (toward chat) -->
  <g id="arrow-right" style="transform-origin: 456px 205px;">
    <line x1="458" y1="205" x2="510" y2="205" stroke="#6264a7" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="518,205 506,199 506,211" fill="#6264a7"/>
  </g>

  <!-- ══════════════ EMAIL ICON (left) ══════════════ -->
  <g id="email-group" style="transform-origin: 104px 205px;">
    <!-- Envelope -->
    <rect x="58" y="172" width="92" height="66" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <!-- Envelope flap V -->
    <polyline points="58,178 104,218 150,178" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linejoin="round"/>
    <!-- Bottom fold lines -->
    <line x1="58" y1="238" x2="90" y2="210" stroke="#1a73e8" stroke-width="1.2" opacity="0.4"/>
    <line x1="150" y1="238" x2="118" y2="210" stroke="#1a73e8" stroke-width="1.2" opacity="0.4"/>
    <!-- Label -->
    <text x="104" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1a73e8">Email</text>
  </g>

  <!-- Email notification badge -->
  <g id="email-badge" style="transform-origin: 148px 172px;">
    <circle cx="148" cy="172" r="11" fill="#dc2626"/>
    <text x="148" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">1</text>
  </g>

  <!-- Email delivered check -->
  <g id="email-check">
    <circle cx="104" cy="290" r="12" fill="#0F9D58"/>
    <text x="104" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">✓</text>
  </g>

  <!-- ══════════════ TEAMS/SLACK CHAT ICON (right) ══════════════ -->
  <g id="chat-group" style="transform-origin: 576px 205px;">
    <!-- Chat bubble main -->
    <rect x="530" y="168" width="92" height="64" rx="10" fill="#ede9fe" stroke="#6264a7" stroke-width="2"/>
    <!-- Chat bubble tail -->
    <polygon points="545,232 532,248 558,232" fill="#ede9fe"/>
    <line x1="545" y1="232" x2="532" y2="248" stroke="#6264a7" stroke-width="2"/>
    <!-- Chat lines (message preview) -->
    <rect x="544" y="182" width="64" height="7" rx="3" fill="#6264a7" opacity="0.4"/>
    <rect x="544" y="194" width="48" height="7" rx="3" fill="#6264a7" opacity="0.4"/>
    <!-- Attachment indicator -->
    <rect x="544" y="206" width="36" height="14" rx="4" fill="#6264a7" opacity="0.2"/>
    <text x="562" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6264a7">📎 report.pdf</text>
    <!-- Label -->
    <text x="576" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6264a7">Teams / Slack</text>
  </g>

  <!-- Chat notification badge -->
  <g id="chat-badge" style="transform-origin: 619px 168px;">
    <circle cx="619" cy="168" r="11" fill="#dc2626"/>
    <text x="619" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">1</text>
  </g>

  <!-- Chat delivered check -->
  <g id="chat-check">
    <circle cx="576" cy="290" r="12" fill="#0F9D58"/>
    <text x="576" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">✓</text>
  </g>

  <!-- ══════════════ STATUS LABELS ══════════════ -->
  <text id="lbl-idle"     x="340" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Pipeline complete — preparing report...</text>
  <text id="lbl-building" x="340" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8">📄 Building personalized PDF...</text>
  <text id="lbl-stamping" x="340" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">🔖 Personalizing for Andy K. ...</text>
  <text id="lbl-sending"  x="340" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6264a7">🚀 Sending to email &amp; chat...</text>
  <text id="lbl-done"     x="340" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F9D58">✅ Delivered to email &amp; Teams/Slack!</text>
</svg>
